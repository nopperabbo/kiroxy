name: Deploy landing to GitHub Pages

# Builds web/landing/ on every push to main and on tags, then publishes
# to GitHub Pages. The deployment URL becomes the project's homepage.

on:
  push:
    branches: [main]
    paths:
      - "web/landing/**"
      - ".github/workflows/landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/landing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/landing/package-lock.json

      - run: npm ci

      - run: npx astro build
        env:
          NODE_ENV: production

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

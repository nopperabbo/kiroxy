name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Publish as snapshot (no GitHub release)?'
        required: false
        default: 'false'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history + tags so goreleaser can build the changelog and
          # resolve previous tag correctly.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Verify module
        run: |
          go mod download
          go version
          go env GOEXPERIMENT

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: >-
            release
            --clean
            ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot == 'true' && '--snapshot --skip=publish,sign' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: |
            dist/*.tar.gz
            dist/*_checksums.txt
            dist/metadata.json
            dist/artifacts.json
          if-no-files-found: warn
          retention-days: 30

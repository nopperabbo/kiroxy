blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/nopperabbo/kiroxy/security/advisories/new
    about: Privately report a vulnerability via GitHub Security Advisories. Do NOT file a public issue for security matters.
  - name: Question or general discussion
    url: https://github.com/nopperabbo/kiroxy/discussions
    about: Use Discussions for "how do I...", "is this supposed to...", or showcase posts. Issues are for bugs and concrete feature requests only.
  - name: Operator troubleshooting
    url: https://github.com/nopperabbo/kiroxy/blob/main/docs/TROUBLESHOOTING.md
    about: Check the troubleshooting guide before filing a bug. Most setup issues are covered there.
